name: Security checks

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install audit tools
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -c requirements/constraints.txt pip-audit bandit detect-secrets

      - name: Dependency audit
        run: python -m pip_audit -r requirements/constraints.txt

      - name: Bandit scan
        run: python -m bandit -r src -c pyproject.toml -ll

  secret-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Scan tracked files for secrets
        run: |
          set -euo pipefail
          python -m pip install "pip==26.1.2"
          python -m pip install -c requirements/constraints.txt detect-secrets
          git ls-files -z | xargs -0 detect-secrets-hook
