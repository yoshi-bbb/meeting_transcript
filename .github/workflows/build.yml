name: Build desktop apps

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        include:
          - runner: ubuntu-latest
            smoke: --full
          - runner: windows-latest
            smoke: --full
          - runner: macos-15
            smoke: ""
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Install Linux system packages
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          alsa_package=libasound2
          if apt-cache policy libasound2 | grep -q "Candidate: (none)"; then
            alsa_package=libasound2t64
          fi
          sudo apt-get install -y --no-install-recommends python3-tk libpulse0 "$alsa_package" libxcb-cursor0

      - name: Install package
        run: |
          python -m pip install "pip==26.1.2"
          python -m pip install -c requirements/constraints.txt -e ".[build,test]"

      - name: Run tests
        run: python -m pytest -q --tb=short

      - name: Build app on Windows/macOS
        if: runner.os != 'Linux'
        run: python scripts/build_desktop.py

      - name: Build app in Docker image
        if: runner.os == 'Linux'
        run: |
          docker build -t meeting-mojiokoshi .
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -e HOME=/tmp \
            -v "$PWD:/app" \
            meeting-mojiokoshi \
            sh -c "python scripts/build_desktop.py && python scripts/smoke_desktop.py --full"

      - name: Smoke test desktop build
        if: runner.os != 'Linux'
        run: python scripts/smoke_desktop.py ${{ matrix.smoke }}

      - name: Package release archive
        run: python scripts/package_release.py
